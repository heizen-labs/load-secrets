name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Build
        run: bun run build

      - name: Check build output
        run: |
          if [ ! -f "dist/index.js" ]; then
            echo "Build failed: dist/index.js not found"
            exit 1
          fi
          echo "Build successful: dist/index.js created"

      - name: Integration test - load secrets action
        id: load-secrets-test
        uses: ./
        with:
          project-id: opengig_devtool-z6dav4p8u
          environment: new-web-local
          api-key: ${{ secrets.HEIZEN_STUDIO_API_KEY }}
          output-path: ./.heizen.test.env

      - name: Verify fetched secrets
        run: |
          if [ ! -f ".heizen.test.env" ]; then
            echo "Load secrets test failed: .heizen.test.env not found"
            exit 1
          fi

          if [ ! -s ".heizen.test.env" ]; then
            echo "Load secrets test failed: .heizen.test.env is empty"
            exit 1
          fi

          echo "Load secrets test passed"
          echo "Fetched secret count: ${{ steps.load-secrets-test.outputs.secret-count }}"
          echo "Exported count: ${{ steps.load-secrets-test.outputs.exported-count }}"

  build-and-package:
    name: Build and Package
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
